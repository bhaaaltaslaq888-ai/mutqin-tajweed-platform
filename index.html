shrh:`<div class="mindmap"><div style="background:var(--teal-pale);border-right:4px solid var(--teal);border-radius:12px;padding:12px 16px;margin:4px 0 14px;font-size:14px;line-height:1.95;color:var(--ink);position:relative;z-index:1"><strong>الرسم:</strong> ما يتعلّقُ بكتابةِ الحروفِ من حذفٍ وإثباتٍ ووصلٍ وفصل. <strong>الضبط:</strong> ما يتعلّقُ بضبطِ الحروفِ بالحركاتِ الإعرابيّةِ والدلالةِ على الأحكام.</div><div style="margin:14px 0 8px;font-weight:800;font-size:13.5px;color:var(--teal-dark);display:flex;align-items:center;gap:8px;position:relative;z-index:1"><span style="width:7px;height:7px;border-radius:50%;background:var(--gold);display:inline-block"></span>قواعدُ الرسمِ الستّ</div><div class="vm-tree-root"><span class="vm-tree-root-ic">✒️</span> رسمُ المصحف</div><div class="vm-tree-branches"><div class="vm-branch vb-ruling"><span class="vm-branch-dot"></span><div class="vm-branch-card"><span class="vm-branch-lbl">① الزيادة</span><div class="vm-branch-body">زيادةُ ألفٍ بعدَ واوِ الجماعة ﴿يَكْتُبُونَ﴾، وزيادةُ الواوِ ﴿أُولَئِكَ﴾، وزيادةُ الياءِ ﴿بِأَيِّد﴾.</div></div></div><div class="vm-branch vb-divide"><span class="vm-branch-dot"></span><div class="vm-branch-card"><span class="vm-branch-lbl">② الحذف</span><div class="vm-branch-body">حذفُ الألفِ ﴿الرَّحْمَن﴾، وحذفُ الواوِ (ثلاثةُ مواضع)، وحذفُ الياءِ في بعضِ المواضع.</div></div></div><div class="vm-branch vb-measure"><span class="vm-branch-dot"></span><div class="vm-branch-card"><span class="vm-branch-lbl">③ الهمز</span><div class="vm-branch-body">أحكامُ كتابةِ الهمزةِ بصورِها المختلفة — يُرجَعُ فيه لكتبِ الرسم.</div></div></div><div class="vm-branch vb-reason"><span class="vm-branch-dot"></span><div class="vm-branch-card"><span class="vm-branch-lbl">④ الإبدال</span><div class="vm-branch-body">إبدالُ الألفِ واوًا ﴿الصَّلَاة﴾ ﴿الزَّكَاة﴾، وياءً ﴿ذَلِك﴾ ﴿الذِّكْرَى﴾.</div></div></div><div class="vm-branch vb-normal"><span class="vm-branch-dot"></span><div class="vm-branch-card"><span class="vm-branch-lbl">⑤ الف k-mid);position:relative;z-index:1;animation:accOpen .2s ease">↩ العربُ كانوا يُتقِنونَ التمييزَ بينَ الحروفِ المتشابهةِ من السياق، والخطرُ الأكبرُ كانَ في <em>اللحنِ الإعرابيّ</em> الذي يُغيِّرُ المعنى (كضمِّ تاءِ «أنعمتُ» بدلَ فتحِها). لاحقًا دخلَ المسلمونَ من أممٍ أخرى لم يألفوا الحروفَ العربيّةَ فاحتاجوا نقطَ الإعجامِ أيضًا.</div><div class="vm-tap-hint">اضغط على «تفكّر» لكشف الإجابة</div></div>`,
def:'الرسم: ما يتعلق بكتابة الحروف من حذف وإثبات ووصل وفصل. والضبط: ما يتعلق بضبط الحروف بالحركات الإعرابية والدلالة على الأحكام. وقواعد الرسم ست: (1) الزيادة: كزيادة الألف بعد واو الجماعة «يكتبون»، وزيادة الواو «أولئك»، وزيادة الياء «بأييد». (2) الحذف: كحذف الألف في «الرحمن»، وحذف الواو في ثلاثة مواضع. (3) الهمز: أحكام كتابة الهمزة. (4) الإبدال: كإبدال الألف واوًا في «الصلاة» و«الزكاة»، وإبدالها ياءً في «الزكوة» عند بعضهم. (5) الفصل والوصل: المقطوع والموصول. (6) ما فيه قراءتان لا يحتملهما رسم واحد فكُتب في مصاحف مختلفة. أقدم علامات الضبط: نقط الإعراب (وضعه أبو الأسود الدؤلي) ونقط الإعجام (وضعه يحيى بن يعمر ونصر بن عاصم الليثي).',

function load(){
  try{const s=JSON.parse(localStorage.getItem(LS_KEY));
    if(s&&s.done) return s;}catch(e){}
  return {done:{c1:[],c2:[],c3:[]}, exam:{c1:null,c2:null,c3:null}, passed:{c1:false,c2:false,c3:false}, stars:0, medals:[], aw:{}};
}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}}

/* ---------- أدوات ---------- */
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');window.scrollTo(0,0);}
function toast(msg){const t=el('div','toast',esc(msg));document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function award(stars,key){if(key&&S.aw[key])return;if(key)S.aw[key]=1;S.stars+=stars;save();}

/* بناء آية كـ spans قابلة للنقر/التمييز */
function ayahHTML(text,opts){
  opts=opts||{};
  const words=text.split(' ');
  let h='';
  words.forEach((w,i)=>{
    const cls=['word'];
    if(opts.hl&&opts.hl.includes(i))cls.push('hl');
    const attrs=opts.clickable?` tabindex="0" role="button" data-idx="${i}"`:'';
    h+=`<span class="${cls.join(' ')}"${attrs}>${esc(w)}</span>`;
    if(i<words.length-1)h+=' ';
  });
  return h;
}

function openCourse(cid){
  cur={cid, ri:0};
  const c=COURSES[cid];

  // دورة بلا محتوى بعد (المتقدمة)
  if(c.soon || !c.rules || !c.rules.length){

    document.getElementById('ruleNav').innerHTML='';

      '<div class="rule-card" style="text-align:center">'+
      '<h2 style="color:var(--teal-dark)">'+esc(c.name)+'</h2>'+

      '<p class="progress-label">سيُضاف محتوى هذه الدورة قريبًا بإذن الله.</p></div>';
    return;
  }
  // اذهب لأول حكم غير مكتمل

}

/* ── Accordion builder helper ── */
function makeAccordion(iconEmoji, iconBg, title, subtitle, bodyEl, startOpen){
  const section=el('div','acc-section');

  const hdr=el('button','acc-header'+(startOpen?' open':''));
  const left=el('div','acc-header-left');
  const iconEl=el('div','acc-icon');
  iconEl.style.background=iconBg||'var(--teal-pale)';
  iconEl.textContent=iconEmoji;
  const textWrap=el('div');
  textWrap.appendChild(el('div','acc-title',title));
  if(subtitle) textWrap.appendChild(el('div','acc-subtitle',subtitle));
  left.appendChild(iconEl);
  left.appendChild(textWrap);
  const chevron=el('span','acc-chevron','▼');
  hdr.appendChild(left);
  hdr.appendChild(chevron);

  const body=el('div','acc-body'+(startOpen?' open':''));
  if(bodyEl) body.appendChild(bodyEl);

  hdr.onclick=()=>{
    const isOpen=body.classList.toggle('open');
    hdr.classList.toggle('open',isOpen);
  };

  section.appendChild(hdr);
  section.appendChild(body);
  return {section, body};
}

function buildExercise(r,state,onDone){
  const ex=r.ex;
  const wrap=el('div');
  wrap.appendChild(el('p',null,esc(ex.q)));
  let tries=0;

  if(ex.type==='click'){
    const ay=el('div','ayah clickable');
    ay.innerHTML=ayahHTML(ex.verse.t,{clickable:true});
    wrap.appendChild(ay);
    wrap.appendChild(el('div','sura',`﴿${esc(ex.verse.sura)}: ${esc(String(ex.verse.aya))}﴾`));
    const fb=el('div');wrap.appendChild(fb);
    const need=ex.accept.slice().sort((a,b)=>a-b);
    let picked=[];
    ay.querySelectorAll('.word').forEach(w=>{
      w.onclick=()=>{if(state.done)return;handlePick(+w.dataset.idx,w);};
      w.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();w.click();}};
    });
    function handlePick(idx,wEl){
      if(picked.includes(idx)){picked=picked.filter(x=>x!==idx);wEl.classList.remove('sel');return;}
      picked.push(idx);wEl.classList.add('sel');
      // تحقق فقط عند اكتمال العدد المطلوب
      if(picked.length>=need.length)evaluate();
    }
    function evaluate(){
      tries++;
      const ok = picked.length===need.length && need.every(n=>picked.includes(n));
      if(ok){
        state.done=true;
        ay.classList.remove('clickable');
        ay.querySelectorAll('.word').forEach(w=>{if(need.includes(+w.dataset.idx))w.classList.add('right');w.classList.remove('sel');w.onclick=null;});
        fb.className='feedback ok';fb.textContent='✅ '+(ex.reason||'إجابة صحيحة.');
        onDone();
      }else{
        fb.className='feedback err';
        fb.textContent='❌ ليست هذه المواضع الصحيحة. حاول مرة أخرى.';
        setTimeout(()=>{picked=[];ay.querySelectorAll('.word').forEach(w=>w.classList.remove('sel'));},700);
        if(tries>=2&&ex.hint){const hb=el('div','feedback hint','💡 '+esc(ex.hint));fb.after(hb);}
      }
    }
  } else { // choice
    const fb=el('div');
    const opts=el('div','opts');
    ex.opts.forEach((o,oi)=>{
      const b=el('button','opt',esc(o));
      b.onclick=()=>{
        if(state.done)return;
        tries++;
        opts.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
        if(oi===ex.a){
          b.classList.add('right');state.done=true;
          opts.querySelectorAll('.opt').forEach(x=>x.onclick=null);
          fb.className='feedback ok';fb.textContent='✅ '+(ex.reason||'إجابة صحيحة.');
          onDone();
        }else{
          b.classList.add('wrong');
          fb.className='feedback err';fb.textContent='❌ حاول مرة أخرى.';
          if(tries>=2&&ex.hint){fb.className='feedback hint';fb.textContent='💡 '+ex.hint;}
        }
      };
      opts.appendChild(b);
    });
    wrap.appendChild(opts);wrap.appendChild(fb);
  }
  return wrap;
}

function buildMCQ(mcq,state,onDone){
  const wrap=el('div');
  wrap.appendChild(el('p',null,esc(mcq.q)));
  const fb=el('div');
  const opts=el('div','opts');
  mcq.opts.forEach((o,oi)=>{
    const b=el('button','opt',esc(o));
    b.onclick=()=>{
      if(state.done)return;
      if(oi===mcq.a){
        b.classList.add('right');state.done=true;
        opts.querySelectorAll('.opt').forEach(x=>x.onclick=null);
        fb.className='feedback ok';fb.textContent='✅ '+(mcq.reason||'إجابة صحيحة.');
        onDone();
      }else{
        b.classList.add('wrong');b.onclick=null;
        fb.className='feedback err';fb.textContent='❌ إجابة غير صحيحة، اختر غيرها.';
      }
    };
    opts.appendChild(b);
  });
  wrap.appendChild(opts);wrap.appendChild(fb);
  return wrap;
}

function checkComplete(r,exState,mcqState){
  if(!exState.done||!mcqState.done)return;
  if(S.done[cur.cid].includes(r.id))return;
  S.done[cur.cid].push(r.id);
  award(1,cur.cid+'_'+r.id);
  save();
  toast('أتقنت هذا الحكم! ⭐');
  renderNav();renderHeader();

  if(c.rules.every(x=>S.done[cur.cid].includes(x.id)))award(3,cur.cid+'_allrules');

function appendDoneBanner(area,i){
  if(area.querySelector('.done-banner'))return;
  const c=COURSES[cur.cid];
  const bn=el('div','done-banner');
  const next=i+1<c.rules.length;

    nb.onclick=()=>openRule(i+1);

    if(allDone){const nb=el('button','btn','📝 ابدأ اختبار الدورة');nb.onclick=()=>startExam();bn.appendChild(nb);}

}

/* ================= اختبار الدورة ================= */
let examAns={};
/* ============ بنك الأسئلة الديناميكي ============ */
// يسحب n سؤالاً عشوائياً من exam + mcq + ex لكل الأحكام، لا تتكرّر في الجلسة
function buildExamBank(c, n){
  const pool=[];
  // من مصفوفة exam الرئيسية
  (c.exam||[]).forEach((q,i)=>pool.push({...q,_src:'exam',_i:i}));
  // من كل حكم: mcq وex
  c.rules.forEach((r,ri)=>{
    if(r.mcq) pool.push({type:'mcq',rule:r.id,q:r.mcq.q,opts:r.mcq.opts,a:r.mcq.a,reason:r.mcq.reason,_src:'mcq',_ri:ri});
    if(r.ex&&r.ex.type==='choice') pool.push({type:'mcq',rule:r.id,q:r.ex.q,opts:r.ex.opts,a:r.ex.a,reason:r.ex.reason,_src:'ex',_ri:ri});
  });
  // أسئلة صواب/خطأ مولَّدة ديناميكيًّا من التعريفات
  c.rules.forEach((r,ri)=>{
    if(r.def&&r.def.length>40){
      // سؤال من التعريف (صحيح)
      const defFrag=r.def.slice(0,80).replace(/[.،]/g,'').trim();
      if(defFrag.length>20){
        pool.push({type:'tf',rule:r.id,q:`«${r.nameAr}»: ${defFrag}...`,opts:['صحيح','خطأ'],a:0,reason:`هذا تعريف صحيح لـ«${r.nameAr}».`,_src:'dynTF',_ri:ri});
      }
    }
  });
  // خلط عشوائي (Fisher-Yates)
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  // تجنّب التكرار في الجلسة
  const seenKey='mutqin_exam_seen_'+cur.cid;
  let seen=[];
  try{seen=JSON.parse(sessionStorage.getItem(seenKey)||'[]');}catch(e){}
  const fresh=pool.filter(q=>!seen.includes(q.q));
  const selected=(fresh.length>=n?fresh:pool).slice(0,n);
  const newSeen=[...seen,...selected.map(q=>q.q)];
  try{sessionStorage.setItem(seenKey,JSON.stringify(newSeen.slice(-60)));}catch(e){}
  return selected;
}

function startExam(){
  const c=COURSES[cur.cid];
  examAns={};
  const area=document.getElementById('ruleArea');
  document.getElementById('ruleNav').classList.add('hidden');
  area.innerHTML='';
  area.appendChild(el('h2',null,`📝 اختبار ${esc(c.name)}`));

  // بنك ديناميكي: 12 سؤالاً للمتقدمة و10 لغيرها، لا تتكرّر
  const examN=cur.cid==='c3'?12:10;
  const examQuestions=buildExamBank(c,examN);
  const prog=el('div','exam-progress');
  prog.innerHTML=`<span>📊 ${examQuestions.length} سؤال متنوّع</span><div class="exam-progress-bar"><span id="examProgBar" style="width:0%"></span></div><div class="bank-badge">🎲 لا تتكرّر</div>`;
  area.appendChild(prog);

  examQuestions.forEach((q,qi)=>{
    const box=el('div','exam-q');
    box.appendChild(el('div','qnum',`السؤال ${qi+1} من ${examQuestions.length}`));
    box.appendChild(el('h3',null,esc(q.q)));
    if(q.type==='click'){
      const ay=el('div','ayah clickable');
      ay.innerHTML=ayahHTML(q.verse.t,{clickable:true});
      box.appendChild(ay);
      box.appendChild(el('div','sura',`﴿${esc(q.verse.sura)}: ${esc(String(q.verse.aya))}﴾`));
      let picked=[];
      ay.querySelectorAll('.word').forEach(w=>{
        w.onclick=()=>{const idx=+w.dataset.idx;
          if(picked.includes(idx)){picked=picked.filter(x=>x!==idx);w.classList.remove('sel');}
          else{picked.push(idx);w.classList.add('sel');}
          examAns[qi]=picked.slice();refreshSubmit();};
        w.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();w.click();}};
      });
    }else{ // mcq أو tf
      const opts=el('div','opts');
      q.opts.forEach((o,oi)=>{
        const b=el('button','opt',esc(o));
        b.onclick=()=>{opts.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');examAns[qi]=oi;refreshSubmit();};
        opts.appendChild(b);
      });
      box.appendChild(opts);
    }
    area.appendChild(box);
  });

  window._examQs=examQuestions;
  const submit=el('button','btn','سلّم الاختبار');
  submit.id='examSubmit';submit.disabled=true;
  submit.style.cssText='display:block;margin:20px auto;font-size:18px;padding:14px 40px';
  submit.onclick=()=>gradeExam();
  area.appendChild(submit);
  function refreshSubmit(){
    const answered=(window._examQs||c.exam).every((q,qi)=>{const a=examAns[qi];return q.type==='click'?(Array.isArray(a)&&a.length>0):(a!=null);});
    submit.disabled=!answered;
  }
  refreshSubmit();
  show('course');renderHeader();
}

function gradeExam(){
  const c=COURSES[cur.cid];
  let correct=0;const wrongRules=[];
  (window._examQs||c.exam).forEach((q,qi)=>{
    const a=examAns[qi];let ok=false;
    if(q.type==='click'){const need=q.accept.slice().sort();const got=(a||[]).slice().sort();ok=need.length===got.length&&need.every((n,i)=>n===got[i]);}
    else ok=(a===q.a);
    if(ok)correct++;else if(q.rule)wrongRules.push(q.rule);
  });
  const pct=Math.round(correct/(window._examQs||c.exam).length*100);
  const pass=pct>=80;
  S.exam[cur.cid]=pct;
  if(pass){
    if(!S.passed[cur.cid]){S.passed[cur.cid]=true;award(3,cur.cid+'_pass');
      if(!S.medals.includes(cur.cid))S.medals.push(cur.cid);}
    if(pct===100)award(5,cur.cid+'_100');
  }
  save();
  if(pass)triggerConfetti();
  renderExamResult(pct,pass,correct,(window._examQs||c.exam).length,wrongRules,window._examQs||c.exam);
}

function renderExamResult(pct,pass,correct,total,wrongRules,allQs){
  const area=document.getElementById('ruleArea');
  area.innerHTML='';
  const box=el('div','result-box');
  box.appendChild(el('div',`pct ${pass?'pass':'fail'}`,pct+'%'));
  box.appendChild(el('p',null,`أجبت بشكل صحيح عن ${correct} من ${total} أسئلة`));
  // تفصيل النتيجة
  if(allQs&&allQs.length){
    const detail=el('div');detail.style.cssText='margin:12px 0;font-size:13px;color:var(--ink-mid)';
    allQs.forEach((q,qi)=>{
      const userAns=examAns[qi];
      let ok=false;
      if(q.type==='click'){const need=(q.accept||[]).slice().sort();const got=(userAns||[]).slice().sort();ok=need.length===got.length&&need.every((n,i)=>n===got[i]);}
      else ok=(userAns===q.a);
      const row=el('div');row.style.cssText=`display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:7px;margin-bottom:4px;background:${ok?'rgba(30,122,58,.06)':'rgba(176,48,32,.06)'}`;
      const icon=ok?'✅':'❌';
      const txt=el('div');txt.style.cssText='font-size:12.5px;line-height:1.7;flex:1';
      const correctOpt=q.opts?q.opts[q.a]:'—';
      txt.innerHTML=`<strong>${esc(q.q)}</strong>${!ok&&q.reason?`<br><span style='color:var(--teal-dark)'>✔ الإجابة الصحيحة: ${esc(correctOpt)}</span><br><span style='color:var(--soft);font-size:11.5px'>${esc(q.reason)}</span>`:''}`;
      row.appendChild(el('span',null,icon));
      row.appendChild(txt);
      detail.appendChild(row);
    });
    box.appendChild(detail);
  }
  if(pass){
    box.appendChild(el('h3',null,'أتقنت هذه الدورة 🏆'));
    const nextId=cur.cid==='c1'?'c2':(cur.cid==='c2'?'c3':null);
    if(nextId) box.appendChild(el('p',null,'تم فتح الدورة التالية! يمكنك الانتقال إليها من الصفحة الرئيسية.'));
    showModal('🏆','أتقنت هذه الدورة!',`حصلت على ${pct}% — أحسنت! ${nextId?'فُتحت لك الدورة التالية.':'أتممت جميع الدورات — بارك الله فيك!'}`);
  }else{
    box.appendChild(el('h3',null,'يُنصح بمراجعة الأحكام التالية'));
  }
  area.appendChild(box);

  // وضع المراجعة التلقائي
  const c=COURSES[cur.cid];
  const uniqWrong=[...new Set(wrongRules)];
  const rev=el('div');
  rev.appendChild(el('div','sec-title','وضع المراجعة'));
  if(uniqWrong.length===0){
    rev.appendChild(el('p','feedback ok','أداء مثالي — لا توجد أخطاء للمراجعة 🏆'));
  }else{
    uniqWrong.forEach(rid=>{
      const r=c.rules.find(x=>x.id===rid);if(!r)return;
      const it=el('div','review-item');
      it.innerHTML=`<span>${esc(r.nameAr)}</span>`;
      const b=el('button','btn-ghost','راجع الحكم');
      b.onclick=()=>{document.getElementById('ruleNav').classList.remove('hidden');openRule(c.rules.indexOf(r));};
      it.appendChild(b);
      rev.appendChild(it);
    });
  }
  area.appendChild(rev);

  // أزرار
  const btns=el('div');btns.style.cssText='display:flex;gap:12px;justify-content:center;margin-top:22px;flex-wrap:wrap';
  const retry=el('button','btn-ghost','🔄 إعادة الاختبار');
  retry.onclick=()=>startExam();
  btns.appendChild(retry);
  const home=el('button','btn','⌂ الرئيسية');
  home.onclick=()=>renderHome();
  btns.appendChild(home);
  if(!pass){const back=el('button','btn-ghost','↩ العودة للأحكام');back.onclick=()=>{document.getElementById('ruleNav').classList.remove('hidden');openRule(0);};btns.appendChild(back);}
  area.appendChild(btns);
}

    return `<tr><td><b>${esc(r.nameAr)}</b></td><td>${esc(brief)}</td><td>${esc(ex.t)} (${esc(ex.sura)}: ${esc(String(ex.aya))})</td></tr>`;
  }).join('');
  pa.innerHTML=`<h1>مُتقِن — ملخص ${esc(c.name)}</h1><div class="sub">تعلّم التجويد بإتقان</div>
    <table><tr><th>الحكم</th><th>التعريف المختصر</th><th>مثال</th></tr>${rows}</table>`;
  document.body.classList.add('print-mode');
  window.print();
  function done(){document.body.classList.remove('print-mode');window.removeEventListener('afterprint',done);}

  setTimeout(()=>document.body.classList.remove('print-mode'),1500);
}

function enterPresent(){
  const c=COURSES[cur.cid];
  pres={slides:[],i:0,backRi:cur.ri};
  c.rules.forEach(r=>{
    /* [v5] شريحة عنوان بلا مستوى صعوبة */
    pres.slides.push({type:'title',html:`<div class="p-eyebrow">${esc(c.name)}</div><h2>${esc(r.nameAr)}</h2>${r.nameEn?`<div class="p-text" style="font-size:20px;color:#6B6B60">${esc(r.nameEn)}</div>`:''}`});
    /* [v5] شريحة التعريف كخريطة ذهنية */
    pres.slides.push({type:'def',html:`<div class="p-eyebrow">التعريف</div><div class="p-mindmap">${buildDefVisual(r.def)}</div>`});
    r.examples.forEach(ex=>{
      pres.slides.push({type:'ex',html:`<div class="p-eyebrow">مثال — ${esc(ex.sura)}: ${esc(String(ex.aya))}</div><div class="ayah">${ayahHTML(ex.t,{hl:ex.hl})}</div>${ex.note?`<div class="p-text" style="font-size:20px;color:#6B6B60;margin-top:18px">${esc(ex.note)}</div>`:''}`});
    });
    // سؤال مع زر إظهار الإجابة
    pres.slides.push({type:'q',mcq:r.mcq,name:r.nameAr});
  });
  pres.i=0;
  document.getElementById('present').classList.remove('hidden');
  syncPresentTheme();
  renderSlide();
}
function renderSlide(){
  const s=pres.slides[pres.i];
  const stage=document.getElementById('pSlide');
  if(s.type==='q'){
    let opts=s.mcq.opts.map((o,i)=>`<button class="opt" data-i="${i}">${esc(o)}</button>`).join('');
    stage.innerHTML=`<div class="p-eyebrow">سؤال — ${esc(s.name)}</div><h2 style="font-size:32px">${esc(s.mcq.q)}</h2><div class="opts">${opts}</div><div id="pFeedback" style="font-size:24px;margin-top:20px;min-height:32px;font-weight:700"></div><button class="btn" id="revealBtn" style="margin-top:8px">إظهار الإجابة</button>`;
    let answered=false;
    const fb=stage.querySelector('#pFeedback');
    const reveal=()=>{
      stage.querySelectorAll('.opt').forEach((b,i)=>{if(i===s.mcq.a)b.classList.add('right');b.onclick=null;});
      const rb=stage.querySelector('#revealBtn');if(rb)rb.remove();
    };
    stage.querySelectorAll('.opt').forEach((b,i)=>{
      b.style.cursor='pointer';
      b.onclick=()=>{
        if(answered)return;
        answered=true;
        if(i===s.mcq.a){
          b.classList.add('right');
          fb.style.color='var(--ok)';fb.textContent='✅ إجابة صحيحة';
        }else{
          b.classList.add('wrong');
          fb.style.color='var(--err)';fb.textContent='❌ إجابة خاطئة';
        }
        reveal(); // أبرز الصحيحة دائمًا بعد أول نقر
      };
    });
    stage.querySelector('#revealBtn').onclick=()=>{answered=true;reveal();};
  }else{
    stage.innerHTML=s.html;
  }
  document.getElementById('pCount').textContent=`${pres.i+1} / ${pres.slides.length}`;
}
function pMove(d){
  pres.i=Math.max(0,Math.min(pres.slides.length-1,pres.i+d));
  renderSlide();
}
function exitPresent(){
  document.getElementById('present').classList.add('hidden');
  openRule(pres.backRi);
}

/* ================================================================
   VISUAL MAP SYSTEM v2 — buildDefVisual
   Smart layout engine: auto-detects content type and picks
   the best visual representation:
   • COMPARE  → ضد / مقابلة (تفخيم/ترقيق، لحن جلي/خفي...)
   • FLOW     → مراتب / تسلسل (مراتب القراءة، مراتب التفخيم...)
   • TREE     → شجرة معرفية عامة (الوضع الافتراضي)
   • CARDS    → بطاقات موضوعية للمحتوى الكثيف
   ================================================================ */
function buildDefVisual(defText){
  var e=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};

  // ── 1. Parse & split ─────────────────────────────────────────
  var raw=defText.replace(/\s+/g,' ').trim();
  var sents;
  if(/\(\d+\)/.test(raw)){
    var fn=raw.search(/\(1\)/);
    var pre=raw.slice(0,fn).trim();
    var lb=raw.slice(fn).trim();
    sents=[];
    if(pre){
      // Split on ". و" or ". ف" or ". أ" patterns (Arabic sentence connectors)
      pre.replace(/\.\s+((?:و|ف|أ|ث|ح)[^\u0600-\u06FF])/g,'.\n$1');
      pre.split(/(?<=[.]) (?=[وفأحثالب])/).forEach(function(s){s=s.trim();if(s.length>3)sents.push(s);});
      if(sents.length===0)sents=[pre];
    }
    if(sents.length){sents[sents.length-1]+=' '+lb;}else{sents.push(lb);}
  }else{
    // Smart split: break only on period+space+Arabic letter (sentence start)
    // Don't break if preceded by a single Arabic letter (abbreviation)
    sents=[];
    var parts=raw.split(/(?<=[\u0600-\u06FF\)]{2,}[.]) (?=[\u0600-\u06FF])/);
    parts.forEach(function(s){s=s.trim();if(s.length>3)sents.push(s);});
    if(sents.length===0)sents=[raw];
  }
  // Safety: never return empty
  if(sents.length===0)sents=[raw];

  // ── 2. Classify each sentence ────────────────────────────────
  function classify(s){
    if(/لغةً?\s*:/.test(s))                                          return 'lang';
    if(/اصطلاحً?ا\s*:/.test(s))                                     return 'term';
    if(/حكمه?[اه]?\s*(:|—|هو)/.test(s)||/فرض|واجب|مستحب|مكروه|حرام/.test(s)) return 'ruling';
    if(/مقدار|حركات?\b|مرتبة|مراتب/.test(s))                        return 'measure';
    if(/سبب|علة|لأن|لِأنَّ/.test(s))                                return 'reason';
    if(/ينقسم|أقسام|أنواع|قسمان|نوعان|يشمل|ثلاث|أربع|خمس/.test(s)) return 'divide';
    if(/حروف[ه]?\s*(:|هي|هو)|مجموع[ة]?\s*في/.test(s))              return 'letters';
    if(/وضده|ضده|مقابله|بخلاف/.test(s))                             return 'oppose';
    if(/مجموع[ة]?\s*في|\bيجمع/.test(s))                             return 'group';
    return 'normal';
  }

  var meta={
    lang:    {icon:'🔤', label:'لغةً',      cls:'vb-lang'},
    term:    {icon:'📖', label:'اصطلاحًا', cls:'vb-term'},
    ruling:  {icon:'⚖️', label:'الحكم',    cls:'vb-ruling'},
    measure: {icon:'⏱️', label:'المقدار',  cls:'vb-measure'},
    reason:  {icon:'🔍', label:'السبب',    cls:'vb-reason'},
    divide:  {icon:'🌿', label:'الأقسام',  cls:'vb-divide'},
    letters: {icon:'ح',  label:'الحروف',   cls:'vb-letters'},
    oppose:  {icon:'⇄',  label:'الضد',     cls:'vb-oppose'},
    group:   {icon:'📝', label:'الحروف',   cls:'vb-group'},
    normal:  {icon:'◆',  label:'شرح',      cls:'vb-normal'},
  };

  // Card-variant meta
  var cardMeta={
    lang:    {icon:'🔤', label:'لغةً',      cls:'vc-lang'},
    term:    {icon:'📖', label:'اصطلاحًا', cls:'vc-term'},
    ruling:  {icon:'⚖️', label:'الحكم',    cls:'vc-ruling'},
    measure: {icon:'⏱️', label:'المقدار',  cls:'vc-measure'},
    reason:  {icon:'🔍', label:'السبب',    cls:'vc-reason'},
    divide:  {icon:'🌿', label:'الأقسام',  cls:'vc-divide'},
    letters: {icon:'ح',  label:'الحروف',   cls:'vc-letters'},
    oppose:  {icon:'⇄',  label:'الضد',     cls:'vc-oppose'},
    group:   {icon:'📝', label:'الحروف',   cls:'vc-group'},
    normal:  {icon:'◆',  label:'شرح',      cls:'vc-normal'},
  };

  var types=sents.map(classify);

  // ── 3. Smart layout decision ─────────────────────────────────
  var hasOppose   = types.filter(function(t){return t==='oppose';}).length>=1;
  var hasCompare  = /تفخيم.*ترقيق|ترقيق.*تفخيم|جلي.*خفي|خفي.*جلي|كامل.*ناقص|كبير.*صغير/.test(raw);
  var hasMeasure  = types.filter(function(t){return t==='measure';}).length>=1;
  var hasFlow     = /مراتب[ه]?\s*(:|هي)|أول[اً]?.*ثانيًا|درجة|مستوى/.test(raw) || (hasMeasure && sents.length>=3);
  var hasLetters  = types.filter(function(t){return t==='letters';}).length>=2;
  var isDense     = sents.length>=6;
  var hasLangTerm = types.includes('lang') && types.includes('term');

  var layout = 'tree'; // default
  if(hasCompare || hasOppose)  layout = 'compare';
  else if(hasFlow)             layout = 'flow';
  else if(hasLetters || isDense) layout = 'cards';

  // ── 4. Extract core title ────────────────────────────────────
  var coreTitle=raw.split(/[:\u060c.]/)[0].trim()
    .replace(/\s*(لغةً?|اصطلاحً?ا|—|-).*$/,'').trim();
  if(!coreTitle||coreTitle.length<2) coreTitle=raw.slice(0,30)+'…';
  if(coreTitle.length>36) coreTitle=coreTitle.slice(0,34)+'…';

  // ── 5. Build sub-items from (1)(2)(3) pattern ────────────────
  function extractSubs(body){
    var re=/\((\d+)\)\s*([^()]+?)(?=\s*\(\d+\)|$)/g, nm, arr=[];
    while((nm=re.exec(body))!==null){
      arr.push({n:nm[1], tx:nm[2].trim().replace(/[،.]+$/,'')});
    }
    return arr;
  }

  // ── 6. Build letter chips from Arabic letters in parens ──────
  function letterChips(body, chipCls){
    chipCls=chipCls||'lc-normal';
    // match sequences of Arabic letters separated by ، or space
    var m=body.match(/[\u0600-\u06FF]+/g);
    if(!m||m.length>20) return '';
    // filter single chars and common particles
    var skip={في:1,من:1,مع:1,على:1,هو:1,هي:1,لا:1,أو:1,إن:1,عن:1,بعد:1,قبل:1,إذا:1,هذا:1,عند:1,وهو:1,وهي:1,التي:1,الذي:1,الله:1};
    var singles=m.filter(function(w){return w.length===1&&/[\u0600-\u06FF]/.test(w)&&!skip[w];});
    var groups =m.filter(function(w){return w.length>=2&&w.length<=6&&!skip[w];}).slice(0,12);
    // prefer single letters if we have enough
    if(singles.length>=2){
      return '<div class="vm-letters">'+singles.map(function(c){
        return '<span class="vm-letter '+chipCls+'">'+e(c)+'</span>';
      }).join('')+'</div>';
    }
    if(groups.length>=2){
      return '<div class="vm-letters">'+groups.map(function(w){
        return '<span class="vm-letter '+chipCls+'" style="width:auto;padding:0 8px;font-size:14px">'+e(w)+'</span>';
      }).join('')+'</div>';
    }
    return '';
  }

  // ── 7. Build each view ───────────────────────────────────────
  function buildBranchBody(body,type){
    body=body.replace(/^[\u0648]?[^:]{0,18}(لغةً?|اصطلاحً?ا)\s*:\s*/,'');
    var subs=extractSubs(body);
    if(subs.length>=2){
      var lead=body.split('(1)')[0].trim().replace(/[:،]+$/,'');
      var h=(lead?'<div>'+e(lead)+'</div>':'')+'<div class="vm-sublist">';
      subs.forEach(function(it){
        h+='<div class="vm-sub"><span class="vm-sub-n">'+e(it.n)+'</span><span>'+e(it.tx)+'</span></div>';
      });
      return h+'</div>';
    }
    var chips='';
    if(type==='letters'||type==='group'){chips=letterChips(body,'lc-letters');}
    return e(body)+(chips?'<div style="margin-top:6px">'+chips+'</div>':'');
  }

  // —— TREE VIEW ————————————————————————————————————————————————
  function buildTree(){
    var h='<div class="mindmap">';
    h+='<div class="mm-core"><span style="font-size:18px">🧠</span>'+e(coreTitle)+'</div>';
    h+='<div class="mm-branches">';
    sents.forEach(function(s,idx){
      var t=types[idx], m=meta[t];
      var bodyHTML=buildBranchBody(s,t);
      var nid='mn_'+uid+'_'+idx;
      h+='<div class="mm-node '+m.cls+'">';
      h+='<span class="mm-dot"></span>';
      h+='<div class="mm-card '+m.cls+'" onclick="vmToggleItem(\''+nid+'\')" style="cursor:pointer">';
      h+='<div style="display:flex;align-items:center;justify-content:space-between">';
      h+='<span class="mm-lbl">'+e(m.icon)+' '+e(m.label)+'</span>';
      h+='<span id="'+nid+'_chv" style="font-size:9px;color:var(--muted);transition:transform .2s">▾</span>';
      h+='</div>';
      h+='<div class="mm-body" id="'+nid+'" style="display:none;margin-top:6px;animation:accOpen .18s ease">'+bodyHTML+'</div>';
      h+='</div></div>';
    });
    h+='</div>';
    h+='<div class="vm-tap-hint">اضغط على أي بطاقة لقراءة الشرح</div>';
    h+='</div>';
    return h;
  }

  // —— CARD VIEW ————————————————————————————————————————————————
  function buildCards(){
    var h='<div class="mindmap">';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;position:relative;z-index:1">';
    h+='<div class="mm-core" style="font-size:15px;padding:9px 18px"><span style="font-size:17px">🧠</span>'+e(coreTitle)+'</div></div>';
    h+='<div class="vm-cards" style="position:relative;z-index:1">';
    sents.forEach(function(s,idx){
      var t=types[idx], cm=cardMeta[t];
      var body=s.replace(/^[\u0648]?[^:]{0,18}(لغةً?|اصطلاحً?ا)\s*:\s*/,'');
      var subs=extractSubs(body);

      if(t==='letters'||t==='group'){chips=letterChips(body,'lc-letters');}

        subs.forEach(function(it){bodyInner+='<div class="vm-sub"><span class="vm-sub-n">'+e(it.n)+'</span><span>'+e(it.tx)+'</span></div>';});
        bodyInner+='</div>';
      }else{
        bodyInner+=e(body);
        if(chips)bodyInner+='<div style="margin-top:6px">'+chips+'</div>';
      }
      h+='<div class="vm-card '+cm.cls+'" onclick="vmToggleItem(\''+nid+'\')" style="cursor:pointer">';
      h+='<div class="vm-card-head" style="display:flex;justify-content:space-between;align-items:center">';
      h+='<div style="display:flex;align-items:center;gap:8px"><div class="vm-card-icon">'+e(cm.icon)+'</div>';
      h+='<span class="vm-card-label">'+e(cm.label)+'</span></div>';
      h+='<span id="'+nid+'_chv" style="font-size:10px;color:var(--muted);transition:transform .2s">▾</span>';
      h+='</div>';
      h+='<div class="vm-card-body" id="'+nid+'" style="display:none;padding:12px 14px;animation:accOpen .18s ease">'+bodyInner+'</div>';
      h+='</div>';
    });
    h+='</div>';
    h+='<div class="vm-tap-hint">اضغط على أي بطاقة لقراءة الشرح</div>';
    h+='</div>';
    return h;
  }

  // —— COMPARE VIEW — جدول مقارنة ─────────────────────────────
  function buildCompare(){
    // ── Smart pair extraction ──
    // Find all "X: definition. وضده/مقابله Y: definition." patterns
    var pairs=[];
    var pairRe=/([\u0600-\u06FF\s]{2,20})\s*[:—]\s*([^.،؟!]{6,200})[.،]\s*(?:وضده?|مقابله?|خلافه?|بينما)\s*([\u0600-\u06FF\s]{2,20})\s*[:—]\s*([^.،؟!]{6,200})/g;
    var pm;
    while((pm=pairRe.exec(raw))!==null){
      pairs.push({nameA:pm[1].trim(), bodyA:pm[2].trim(), nameB:pm[3].trim(), bodyB:pm[4].trim()});
    }

    // If no pairs found, fall back to sentence-level split
    if(pairs.length===0){
      var pairA=[], pairB=[], shared=[];
      sents.forEach(function(s,idx){
        var t=types[idx];
        if(t==='lang'||t==='term'){shared.push({s:s,t:t});}
        else if(/وضده?|مقابله?|بينما/.test(s)||t==='oppose'){
          // split this sentence
          var splitM=s.match(/^(.+?)[.،]\s*(?:وضده?|مقابله?|بينما)\s*(.+)$/);
          if(splitM){pairA.push(splitM[1].trim());pairB.push(splitM[2].trim());}
          else{pairB.push(s);}
        }else{
          if(pairB.length===0)pairA.push(s); else pairB.push(s);
        }
      });

      var twoNames=raw.match(/([\u0600-\u06FF]{2,14})\s*[:—]/g);
      var nameA=(twoNames&&twoNames[0])?twoNames[0].replace(/[:—]/,'').trim():'الأول';
      var nameB=(twoNames&&twoNames[1])?twoNames[1].replace(/[:—]/,'').trim():'الثاني';

      var h='<div class="mindmap"><div style="position:relative;z-index:1">';
      if(shared.length){
        h+='<div style="margin-bottom:12px">';
        shared.forEach(function(item){
          var m=meta[item.t];
          h+='<div class="mm-card '+m.cls+'" style="margin-bottom:6px"><span class="mm-lbl">'+e(m.icon)+' '+e(m.label)+'</span><div class="mm-body">'+buildBranchBody(item.s,item.t)+'</div></div>';
        });
        h+='</div>';
      }
      // TABLE
      h+='<table class="vm-table"><thead><tr>';
      h+='<th style="color:var(--c-lang)">'+e(nameA)+'</th>';
      h+='<th style="color:var(--c-oppose)">'+e(nameB)+'</th>';
      h+='</tr></thead><tbody>';
      var maxLen=Math.max(pairA.length,pairB.length,1);
      for(var i=0;i<maxLen;i++){
        h+='<tr><td>'+(pairA[i]?e(pairA[i]):'—')+'</td><td>'+(pairB[i]?e(pairB[i]):'—')+'</td></tr>';
      }
      h+='</tbody></table></div></div>';
      return h;
    }

    // Structured pairs found — build rich table
    var h='<div class="mindmap"><div style="position:relative;z-index:1">';
    h+='<table class="vm-table"><thead><tr>';
    h+='<th style="width:30%;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.6px">المصطلح</th>';
    h+='<th style="color:var(--c-lang)">التعريف / الحكم</th>';
    h+='<th style="color:var(--c-oppose)">ضده / مقابله</th>';
    h+='</tr></thead><tbody>';
    pairs.forEach(function(p){
      h+='<tr>';
      h+='<td style="font-weight:700;color:var(--ink)">'+e(p.nameA)+'<br><small style="color:var(--muted);font-weight:500">مقابل: '+e(p.nameB)+'</small></td>';
      h+='<td>'+e(p.bodyA)+'</td>';
      h+='<td>'+e(p.bodyB)+'</td>';
      h+='</tr>';
    });
    h+='</tbody></table>';
    // Remaining sentences as tree
    var remainSents=sents.filter(function(s){
      return !pairs.some(function(p){return s.includes(p.bodyA.slice(0,20))||s.includes(p.bodyB.slice(0,20));});
    });
    if(remainSents.length){
      h+='<div style="margin-top:12px" class="mm-branches">';
      remainSents.forEach(function(s,idx){
        var t=classify(s), m=meta[t];
        h+='<div class="mm-node '+m.cls+'"><span class="mm-dot"></span><div class="mm-card '+m.cls+'"><span class="mm-lbl">'+e(m.icon)+' '+e(m.label)+'</span><div class="mm-body">'+buildBranchBody(s,t)+'</div></div></div>';
      });
      h+='</div>';
    }
    h+='</div></div>';
    return h;
  }

  // —— FLOW VIEW ────────────────────────────────────────────────
  function buildFlow(){
    // Try colon-separated named steps (X: body.)
    var stepRe=/([^\u060c:—.\n]{2,20})\s*[:—]\s*([^:—]{8,200}?)(?=[.،](?:\s|$)|$)/g;
    var sm, steps=[];
    var testStr=raw;
    while((sm=stepRe.exec(testStr))!==null&&steps.length<8){
      var title=sm[1].trim().replace(/^(و|ف|ثم|أو)\s*/,'');
      var body=sm[2].trim();
      // Skip tiny fragments
      if(title.length>=2&&title.length<=22&&body.length>=6){
        steps.push({title:title, body:body});
      }
    }
    // Deduplicate / fallback
    if(steps.length<2){
      steps=sents.map(function(s,i){
        return {title:i===0?coreTitle:('نقطة '+(i+1)), body:s};
      });
    }
    // Trim to max 7
    steps=steps.slice(0,7);

    var ranks=['الأولى','الثانية','الثالثة','الرابعة','الخامسة','السادسة','السابعة'];
    var h='<div class="mindmap"><div style="position:relative;z-index:1">';
    h+='<div class="mm-core" style="font-size:15px;padding:9px 18px;margin-bottom:18px"><span style="font-size:16px">🏅</span> '+e(coreTitle)+'</div>';
    h+='<div class="vm-flow">';
    steps.forEach(function(st,i){
      var nid='mf_'+uid+'_'+i;
      h+='<div class="vm-flow-step">';
      h+='<div class="vm-flow-num">'+e(i+1)+'<small>'+(ranks[i]||'')+'</small></div>';
      h+='<div class="vm-flow-content" onclick="vmToggleItem(\''+nid+'\')" style="cursor:pointer">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';
      h+='<strong>'+e(st.title)+'</strong>';
      h+='<span id="'+nid+'_chv" style="font-size:9px;color:var(--muted);flex-shrink:0;margin-right:8px;transition:transform .2s">▾</span>';
      h+='</div>';
      h+='<div id="'+nid+'" style="display:none;font-size:13.5px;line-height:1.75;color:var(--ink);margin-top:6px;animation:accOpen .18s ease">'+e(st.body)+'</div>';
      h+='</div></div>';
    });
    h+='</div>';
    h+='<div class="vm-tap-hint">اضغط على أي خطوة لقراءة التفاصيل</div>';
    h+='</div></div>';
    return h;
  }

  // ── 8. Render with view toggle ───────────────────────────────
  var uid='vm_'+Math.random().toString(36).slice(2,8);
  var defaultView=layout;

  var views=[
    {key:'tree',  icon:'🌿', label:'شجرة'},
    {key:'cards', icon:'🗂️', label:'بطاقات'},
    {key:'flow',  icon:'🏅', label:'مراتب'},
  ];
  // Only show compare if detected
  if(hasCompare||hasOppose){
    views.unshift({key:'compare', icon:'⇄', label:'مقابلة'});
  }

  // ── Build interactive wrappers for each view ─────────────────
  // Each branch/card gets a click-to-reveal body
  function wrapInteractive(html, wrapCls){
    // Parse the rendered HTML and inject click-to-expand on mm-card / vm-card / vm-branch-card / vm-flow-content / vm-compare-item / td
    // We do this by modifying the build functions to emit interactive markup
    return html; // views already built with interactive markup below
  }

      h+='<div class="vm-node-body" id="'+nid+'" style="display:none;margin-top:8px">'+bodyHTML+'</div>';

  function buildCardsInteractive(){

  // ── Interactive flow builder ─────────────────────────────────
  function buildFlowInteractive(){
    var stepRe=/([^\u060c:—.\n]{2,20})\s*[:—]\s*([^:—]{8,200}?)(?=[.،](?:\s|$)|$)/g;
    var sm, steps=[];
    var testStr=raw;
    while((sm=stepRe.exec(testStr))!==null&&steps.length<8){
      var title=sm[1].trim().replace(/^(و|ف|ثم|أو)\s*/,'');
      var body=sm[2].trim();
      if(title.length>=2&&title.length<=22&&body.length>=6) steps.push({title:title,body:body});
    }
    if(steps.length<2) steps=sents.map(function(s,i){return{title:i===0?coreTitle:'نقطة '+(i+1),body:s};});
    steps=steps.slice(0,7);
    var ranks=['الأولى','الثانية','الثالثة','الرابعة','الخامسة','السادسة','السابعة'];
    var h='<div class="mindmap"><div style="position:relative;z-index:1">';

      h+='</div></div>';
    });
    h+='</div></div></div>';
    return h;
  }

  // ── Interactive compare (table rows expand) ───────────────────
  function buildCompareInteractive(){
    // Reuse original compare but wrap each row body
    var pairA=[], pairB=[], shared=[];
    var pairRe=/([\u0600-\u06FF\s]{2,20})\s*[:—]\s*([^.،؟!]{6,200})[.،]\s*(?:وضده?|مقابله?|خلافه?|بينما)\s*([\u0600-\u06FF\s]{2,20})\s*[:—]\s*([^.،؟!]{6,200})/g;
    var pm, pairs=[];
    while((pm=pairRe.exec(raw))!==null){
      pairs.push({nameA:pm[1].trim(),bodyA:pm[2].trim(),nameB:pm[3].trim(),bodyB:pm[4].trim()});
    }

    if(pairs.length===0){
      sents.forEach(function(s,idx){
        var t=types[idx];
        if(t==='lang'||t==='term'){shared.push({s:s,t:t});}
        else if(/وضده?|مقابله?|بينما/.test(s)||t==='oppose'){
          var splitM=s.match(/^(.+?)[.،]\s*(?:وضده?|مقابله?|بينما)\s*(.+)$/);
          if(splitM){pairA.push(splitM[1].trim());pairB.push(splitM[2].trim());}
          else{pairB.push(s);}
        }else{if(pairB.length===0)pairA.push(s);else pairB.push(s);}
      });
      var twoNames=raw.match(/([\u0600-\u06FF]{2,14})\s*[:—]/g);
      var nameA=(twoNames&&twoNames[0])?twoNames[0].replace(/[:—]/,'').trim():'الأول';
      var nameB=(twoNames&&twoNames[1])?twoNames[1].replace(/[:—]/,'').trim():'الثاني';
      var h='<div class="mindmap"><div style="position:relative;z-index:1">';
      if(shared.length){
        h+='<div style="margin-bottom:12px">';
        shared.forEach(function(item){
          var nid='sh_'+uid+'_'+Math.random().toString(36).slice(2,6);
          var m=meta[item.t];
          h+='<div class="mm-card '+m.cls+' vm-interactive" onclick="vmToggleNode(\''+nid+'\')" style="cursor:pointer;margin-bottom:6px">';
          h+='<div style="display:flex;justify-content:space-between;align-items:center"><span class="mm-lbl">'+e(m.icon)+' '+e(m.label)+'</span><span class="vm-node-chv" id="'+nid+'_chv">▼</span></div>';
          h+='<div class="vm-node-body" id="'+nid+'" style="display:none;margin-top:8px">'+buildBranchBody(item.s,item.t)+'</div>';
          h+='</div>';
        });
        h+='</div>';
      }
      h+='<table class="vm-table"><thead><tr><th style="color:var(--c-lang)">'+e(nameA)+'</th><th style="color:var(--c-oppose)">'+e(nameB)+'</th></tr></thead><tbody>';
      var maxLen=Math.max(pairA.length,pairB.length,1);
      for(var i=0;i<maxLen;i++){
        var nid='cmp_'+uid+'_'+i;
        h+='<tr class="vm-interactive" onclick="vmToggleNode(\''+nid+'\')" style="cursor:pointer">';
        h+='<td>'+(pairA[i]?e(pairA[i]):'—')+'</td>';
        h+='<td>';
        h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">';
        h+='<div class="vm-node-body" id="'+nid+'" style="display:none;flex:1">'+(pairB[i]?e(pairB[i]):'—')+'</div>';
        h+='<span style="color:var(--muted);font-size:11px;white-space:nowrap">'+(pairB[i]?e(pairB[i].slice(0,20))+'…':'اضغط')+'</span>';
        h+='<span class="vm-node-chv" id="'+nid+'_chv">▼</span>';
        h+='</div></td>';
        h+='</tr>';
      }
      h+='</tbody></table></div></div>';
      return h;
    }

    // Structured pairs — expandable rows
    var h='<div class="mindmap"><div style="position:relative;z-index:1">';
    h+='<table class="vm-table"><thead><tr>';
    h+='<th style="width:28%;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.6px">المصطلح</th>';
    h+='<th style="color:var(--c-lang)">التعريف</th>';
    h+='<th style="color:var(--c-oppose)">الضد / المقابل</th>';
    h+='</tr></thead><tbody>';
    pairs.forEach(function(p,i){
      var nid='pr_'+uid+'_'+i;
      h+='<tr class="vm-interactive" onclick="vmToggleNode(\''+nid+'\')" style="cursor:pointer">';
      h+='<td style="font-weight:700;color:var(--ink)">';
      h+=e(p.nameA)+'<br><small style="color:var(--muted);font-weight:500">↔ '+e(p.nameB)+'</small></td>';
      h+='<td>';
      h+='<div class="vm-node-body" id="'+nid+'_a" style="display:none">'+e(p.bodyA)+'</div>';
      h+='<span class="vm-preview-txt">'+e(p.bodyA.slice(0,30))+'…</span>';
      h+='</td>';
      h+='<td>';
      h+='<div class="vm-node-body" id="'+nid+'_b" style="display:none">'+e(p.bodyB)+'</div>';
      h+='<span class="vm-preview-txt">'+e(p.bodyB.slice(0,30))+'…</span>';
      h+='<span class="vm-node-chv" id="'+nid+'_chv" style="float:left">▼</span>';
      h+='</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
    return h;
  }

  var rendered={
    tree:    buildTreeInteractive(),
    cards:   buildCardsInteractive(),
    flow:    buildFlowInteractive(),
    compare: (hasCompare||hasOppose)?buildCompareInteractive():buildTreeInteractive(),
  };

  var toggleHTML='<div class="vm-toggle-row">';
  views.forEach(function(v){
    var active=(v.key===defaultView)?'active':'';
    toggleHTML+='<button class="vm-toggle-btn '+active+'" onclick="vmSwitch(\''+uid+'\',\''+v.key+'\')" id="'+uid+'_btn_'+v.key+'">'
      +e(v.icon)+' '+e(v.label)+'</button>';
  });
  toggleHTML+='</div>';

  var dataScript='<script id="'+uid+'_data" type="application/json">'+JSON.stringify(rendered).replace(/<\/script>/g,'<\\/script>')+'<\/script>';

  return '<div class="def-visual-wrap">'+toggleHTML+
    '<div id="'+uid+'_panel">'+rendered[defaultView]+'</div>'+
    dataScript+'</div>';
}

function vmSwitch(uid, view){
  var dataEl=document.getElementById(uid+'_data');
  if(!dataEl)return;
  var rendered;
  try{rendered=JSON.parse(dataEl.textContent);}catch(ex){return;}
  var panel=document.getElementById(uid+'_panel');
  if(panel&&rendered[view]){
    panel.innerHTML=rendered[view];
    panel.querySelectorAll('.vm-branch,.vm-card,.vm-flow-step').forEach(function(el,i){
      el.style.animationDelay=(i*0.04)+'s';
    });
  }
  document.querySelectorAll('[id^="'+uid+'_btn_"]').forEach(function(b){
    b.classList.remove('active');
  });
  var activeBtn=document.getElementById(uid+'_btn_'+view);
  if(activeBtn)activeBtn.classList.add('active');
}

/* تفاعل عناصر الخريطة — فتح/إغلاق عند النقر */
function vmToggleNode(nid){
  var ids=[nid, nid+'_a', nid+'_b'];
  var chv=document.getElementById(nid+'_chv');
  var anyOpen=false;
  ids.forEach(function(id){
    var body=document.getElementById(id);
    if(!body)return;
    var open=body.style.display==='none'||body.style.display==='';
    body.style.display=open?'block':'none';
    var preview=body.parentElement?body.parentElement.querySelector('.vm-preview-txt'):null;
    if(preview)preview.style.display=open?'none':'';
    if(open)anyOpen=true;
  });
  if(chv){
    chv.style.transform=anyOpen?'rotate(180deg)':'rotate(0deg)';
    chv.style.color=anyOpen?'var(--teal)':'var(--muted)';
    chv.style.transition='transform .2s ease, color .2s ease';
  }
}
/* alias للكود القديم */
function vmToggleItem(nid){ vmToggleNode(nid); }

/* ───── دخول/تسجيل المعلّم والأدمن (عبر Supabase) ───── */
function renderSupaLogin(role, mode){
  var l=document.getElementById('login');
  var meta={
    admin:  {icon:'🛡️', label:'الإدارة', badge:'إدارة', cls:'admin'},
    teacher:{icon:'👨‍🏫', label:'المعلّم', badge:'معلّم', cls:'teacher'}
  }[role];

  var pendingNote = (role==='teacher' && mode==='signup')
    ? '<div class="login-pending">📌 بعد التسجيل ستدخل كـ«طالب» مؤقتًا. أبلغ الإدارة باعتماد بريدك معلّمًا، ثم أعد الدخول.</div>'
    : '';

  l.innerHTML=
    '<div class="login-box">'+
      '<button class="login-back" id="loginBack">‹ رجوع</button>'+
      '<div class="login-role-badge '+meta.cls+'">'+meta.icon+' '+meta.badge+'</div>'+
      '<div class="login-brand" style="font-size:34px">'+(mode==='signin'?'تسجيل الدخول':'إنشاء حساب')+'</div>'+
      '<div class="login-tabs">'+
        '<button class="login-tab '+(mode==='signin'?'active':'')+'" id="tabSignin">دخول</button>'+
        '<button class="login-tab '+(mode==='signup'?'active':'')+'" id="tabSignup">حساب جديد</button>'+
      '</div>'+
      (mode==='signup' ? '<label class="login-label">الاسم الكامل</label><input type="text" class="login-input" id="loginName" placeholder="الاسم" style="direction:rtl;text-align:right">' : '')+
      '<label class="login-label">البريد الإلكتروني</label>'+
      '<input type="email" class="login-input" id="loginEmail" placeholder="example@email.com" autocomplete="email">'+
      '<label class="login-label" style="margin-top:14px">كلمة السر</label>'+
      '<input type="password" class="login-input" id="loginPw" placeholder="••••••••" autocomplete="'+(mode==='signin'?'current-password':'new-password')+'">'+
      '<div class="login-errmsg" id="loginErr"></div>'+
      '<button class="btn login-btn" id="loginSubmit">'+(mode==='signin'?'دخول ➜':'إنشاء الحساب ➜')+'</button>'+
      pendingNote+
    '</div>';

  var inp=document.getElementById('loginEmail');
  var pw=document.getElementById('loginPw');
  var nameEl=document.getElementById('loginName');
  var errEl=document.getElementById('loginErr');

  var setErr=function(m){ errEl.textContent=m; };
  var clearErr=function(){ errEl.textContent=''; inp.classList.remove('err'); pw.classList.remove('err'); };

  var doAuth=async function(){
    clearErr();
    var email=inp.value.trim().toLowerCase();
    var pass=pw.value;
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ inp.classList.add('err'); setErr('بريد إلكتروني غير صحيح'); return; }
    if(!pass||pass.length<6){ pw.classList.add('err'); setErr('كلمة السر ٦ أحرف على الأقل'); return; }

    var btn=document.getElementById('loginSubmit');
    btn.disabled=true; btn.textContent='جارٍ...';
    try{
      if(mode==='signup'){
        var fullName=nameEl?nameEl.value.trim():'';
        await mqSignUp(email, pass, fullName);
        await mqSignIn(email, pass);
      } else {
        await mqSignIn(email, pass);
      }
      // تحقّق من الدور الفعلي من Supabase
      var profile = MQ.profile;
      var realRole = profile ? profile.role : 'student';

      if(role==='admin' && realRole!=='admin'){
        await mqSignOut();
        setErr('هذا الحساب ليس إدارة. تواصل مع المسؤول.');
        btn.disabled=false; btn.textContent='دخول ➜'; return;
      }
      // المعلّم: إن لم يُعتمد بعد، يدخل كطالب مع تنبيه
      if(role==='teacher' && realRole==='student'){
        alert('حسابك لم يُعتمد معلّمًا بعد. ستدخل كطالب — أبلغ الإدارة باعتماد بريدك.');
      }
      loginUserSupa(email, realRole, profile);
    }catch(err){
      var msg=(err&&err.message)?err.message:'تعذّر الدخول';
      if(/Invalid login/i.test(msg)) msg='البريد أو كلمة السر غير صحيحة';
      if(/already registered/i.test(msg)) msg='هذا البريد مسجّل — استخدم «دخول»';
      if(/Email not confirmed/i.test(msg)) msg='يلزم تأكيد البريد أولًا (راجع إعدادات Supabase)';
      setErr(msg);
      btn.disabled=false; btn.textContent=(mode==='signin'?'دخول ➜':'إنشاء الحساب ➜');
    }
  };

  inp.oninput=clearErr; pw.oninput=clearErr;
  pw.onkeydown=function(e){if(e.key==='Enter')doAuth();};
  document.getElementById('loginSubmit').onclick=doAuth;
  document.getElementById('loginBack').onclick=renderRolePick;
  document.getElementById('tabSignin').onclick=function(){ renderSupaLogin(role,'signin'); };
  document.getElementById('tabSignup').onclick=function(){ renderSupaLogin(role,'signup'); };
  inp.focus();
}

/* تسجيل دخول محلي (الطالب) */
function loginUser(email, role){
  currentEmail=email;
  currentRole=role||'student';
  LS_KEY='mutqin_v4_'+email;
  localStorage.setItem(LS_EMAIL_KEY,email);
  localStorage.setItem('mutqin_v4_role',currentRole);

  var list=[];

  renderHome();
}

/* ===== توليد سؤال جديد لكل تمرين ===== */
function buildDynQuestion(r, container) {
  const pool=[];
  // من mcq وex الحكم
  if(r.mcq) pool.push({q:r.mcq.q,opts:r.mcq.opts,a:r.mcq.a,reason:r.mcq.reason||''});
  if(r.ex&&r.ex.type==='choice') pool.push({q:r.ex.q,opts:r.ex.opts,a:r.ex.a,reason:r.ex.reason||''});
  // من bank exam الدورة المرتبط بهذا الحكم
  const cid=cur.cid;
  if(COURSES[cid]&&COURSES[cid].exam){
    COURSES[cid].exam.forEach(eq=>{
      if(eq.rule===r.id&&(eq.type==='mcq'||eq.type==='tf')){
        pool.push({q:eq.q,opts:eq.opts,a:eq.a,reason:eq.reason||''});
      }
    });
  }
  if(!pool.length){container.innerHTML='<p style="font-size:13px;color:var(--soft);padding:8px">لا توجد أسئلة إضافية لهذا الحكم بعد.</p>';return;}
  // خلط وتتبع
  const seenKey='dynq_'+cid+'_'+r.id;
  let seen=[];
  try{seen=JSON.parse(sessionStorage.getItem(seenKey)||'[]');}catch(e){}
  const shuffled=pool.slice().sort(()=>Math.random()-.5);
  const fresh=shuffled.filter(q=>!seen.includes(q.q));
  const chosen=(fresh.length?fresh:shuffled)[0];
  seen.push(chosen.q);
  try{sessionStorage.setItem(seenKey,JSON.stringify(seen.slice(-20)));}catch(e){}
  // بناء UI
  container.innerHTML='';
  const box=el('div','dyn-q-box');
  box.appendChild(el('p',null,esc(chosen.q)));
  const optsEl=el('div','dyn-opts');
  const fb=el('div','dyn-q-fb');
  let answered=false;
  const idxs=chosen.opts.map((_,i)=>i).sort(()=>Math.random()-.5);
  idxs.forEach((oi,pos)=>{
    const b=el('button','dyn-opt',esc(chosen.opts[oi]));
    b.onclick=()=>{
      if(answered)return;
      answered=true;
      optsEl.querySelectorAll('.dyn-opt').forEach(x=>x.onclick=null);
      if(oi===chosen.a){
        b.classList.add('right');
        fb.className='dyn-q-fb feedback ok';
        fb.textContent='✅ '+(chosen.reason||'إجابة صحيحة.');
      }else{
        b.classList.add('wrong');
        optsEl.querySelectorAll('.dyn-opt').forEach((x,xi)=>{if(idxs[xi]===chosen.a)x.classList.add('right');});
        fb.className='dyn-q-fb feedback err';
        fb.textContent='❌ '+(chosen.reason||'');
      }
      box.appendChild(fb);
    };
    optsEl.appendChild(b);
  });
  box.appendChild(optsEl);
  container.appendChild(box);
}


/* ===== مساعد مُتقِن ===== */
const ASST_SYSTEM = `أنت مساعد متخصّص في علم التجويد وتعليم القرآن الكريم.
تجيب باللغة العربية بأسلوب علمي دقيق ومبسّط.
عند تخطيط المشاريع والمقررات: تستخدم الجداول والقوائم المنظّمة.
مصدرك الأساسي: كتاب المنير في أحكام التجويد.
لا تتجاوز 400 كلمة في الردّ إلا إذا طُلب تفصيل.`;

let asstHistory = [];

function asstFill(text) {
  document.getElementById('asst-input').value = text;
  document.getElementById('asst-input').focus();
}

function asstAddMsg(role, text) {
  const box = document.getElementById('asst-messages');
  const msg = el('div', 'asst-msg ' + role);
  // تحويل ** bold ** و줄바꿈
  msg.innerHTML = esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
  return msg;
}

function asstTyping() {
  const box = document.getElementById('asst-messages');
  const t = el('div', 'asst-typing');
  t.innerHTML = '<span></span><span></span><span></span>';
  box.appendChild(t);
  box.scrollTop = box.scrollHeight;
  return t;
}

async function asstSend() {
  const inp = document.getElementById('asst-input');
  const text = inp.value.trim();
  if (!text) return;

  const apiKey = document.getElementById('asst-api-key').value.trim();
  const btn = document.getElementById('asst-send-btn');

  asstAddMsg('user', text);
  asstHistory.push({ role: 'user', content: text });
  inp.value = '';
  btn.disabled = true;

  const typing = asstTyping();

  try {
    const headers = { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' };
    if (apiKey) headers['x-api-key'] = apiKey;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: ASST_SYSTEM,
        messages: asstHistory.slice(-10)
      })
    });

    typing.remove();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        asstAddMsg('ai', '⚠️ المفتاح غير صحيح أو مفقود. أضف مفتاح Anthropic API في الحقل أعلاه.');
      } else {
        asstAddMsg('ai', '⚠️ خطأ في الاتصال: ' + (err.error?.message || res.status));
      }
      btn.disabled = false;
      return;
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || '(لا يوجد ردّ)';
    asstHistory.push({ role: 'assistant', content: reply });
    asstAddMsg('ai', reply);

  } catch(e) {
    typing.remove();
    asstAddMsg('ai', '⚠️ تعذّر الاتصال بالخادم. تأكّد من الاتصال بالإنترنت.');
  }

  btn.disabled = false;
}

// إرسال بـ Ctrl+Enter
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter' && document.getElementById('asst-input') === document.activeElement) {
    asstSend();
  }
});

      <label style="font-size:12px;color:var(--soft)">مفتاح Anthropic API (اختياري — يُستخدم محليًّا فقط)</label>
      <input type="password" id="asst-api-key" class="asst-api-input" placeholder="sk-ant-..." autocomplete="off">
    </div>
    <div style="font-size:12.5px;color:var(--soft);margin-bottom:8px">أمثلة سريعة:</div>
    <div class="asst-examples">
      <span class="asst-chip" onclick="asstFill('اشرح لي حكم الإخفاء الحقيقي بأسلوب مبسّط')">شرح الإخفاء</span>
      <span class="asst-chip" onclick="asstFill('ما الفرق بين الإدغام بغنة والإدغام بلا غنة؟')">الإدغام</span>
      <span class="asst-chip" onclick="asstFill('اعطني 5 أسئلة اختبار على أحكام المدود')">أسئلة المدود</span>
      <span class="asst-chip" onclick="asstFill('خطّط لي درسًا عن الوقف والابتداء لطلاب المرحلة المتوسطة')">تخطيط درس</span>
      <span class="asst-chip" onclick="asstFill('أريد بناء مقرر تجويد من 12 حصة — ساعدني في الخطة')">مشروع مقرر</span>
    </div>
    <div class="asst-messages" id="asst-messages"></div>
    <div class="asst-input-wrap" style="margin-top:12px">
      <textarea class="asst-textarea" id="asst-input" placeholder="اكتب سؤالك أو مشروعك..." rows="3"></textarea>
      <button class="asst-send" id="asst-send-btn" onclick="asstSend()">إرسال ✦</button>
    </div>
    <div class="asst-api-note">الرسائل لا تُرسَل لأي طرف خارجي إلا Anthropic API · لا يُحفظ المفتاح</div>
  </div>
</div>

</body>
</html>
